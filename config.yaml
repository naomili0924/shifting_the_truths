# =============================================================
# Shifting Truth — agent & game configuration
#
# Every LLM agent picks its own brain. provider options:
#   anthropic : public API   (needs ANTHROPIC_API_KEY env var)
#   onnx      : local model  (needs onnxruntime-genai + onnx_dir)
#   mock      : canned replies, no network (plumbing tests)
#
# You can mix freely: e.g. cheap API model for NPCs, strong API
# model for the judge — or NPCs on a local ONNX model and the
# judge on the API.
# =============================================================
agents:
  npc:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    # provider: onnx
    # onnx_dir: ./models/phi-3.5-mini-instruct-onnx
  judge:
    provider: anthropic
    model: claude-sonnet-4-6
    # The judge writes deeds/gossip and grades the final answer.
    # Give it the strongest model you can afford.

game:
  # Language: en | zh. Override with --lang; if left null the game asks
  # at startup. English stays the default; each language has its own case.
  lang: null
  cases:
    en: case.yaml
    zh: case_zh.yaml
  case: case.yaml     # fallback if no per-language case is set
  seed: null          # seeds method/clue rolls; the culprit is the
                      # judge LLM's choice, so see the developer log to
                      # reproduce a specific game's hidden truth
  # Launch mode (override with --mode):
  #   production : logs the full conversation only.
  #   developer  : also logs the judge's culprit/motive choice, the
  #                resolved ground truth, and every NPC's memory at each
  #                stage. Logs are written to disk, never shown in-game.
  mode: production
  log_dir: logs       # logs go to <log_dir>/<session-timestamp>/

# Time costs (in minutes of the in-fiction clock)
costs:
  search: 2           # searching one spot
  question: 1         # one question to a suspect
  show: 1             # showing a piece of evidence

# Generated art for the Phaser web UI (web.py). Optional: if the model or a GPU
# is unavailable, generation is skipped and the UI falls back to plain backdrops
# — exactly like the mock-LLM fallback. Manifest first, paint second: the room
# backdrops are painted from the per-run room manifest, the chips come from the
# manifest, never from the picture.
images:
  enabled: true
  idmc_path: /workspace                           # holds inference_driven_model_compiler
  provider: CUDAExecutionProvider                 # falls back to no-art if it can't load
  cache_dir: webui/assets/cache                   # served at /assets/cache/<name>
  # One model per language: English -> SDXL-Turbo (English prompts), Chinese ->
  # Hunyuan-DiT (Chinese prompts, its strength). Each is loaded lazily on first use.
  by_lang:
    en:
      model_dir: /workspace/models/sdxl-turbo-onnx
      width: 512
      height: 512
      steps: 1          # SDXL-Turbo is a 1-step distilled model
      guidance: 0.0
      style: >-
        moody noir painted illustration, dramatic candlelight, deep shadows,
        point-and-click adventure game art, cinematic, atmospheric
    zh:
      model_dir: /dev/shm/hunyuan-onnx   # ephemeral: re-export on instance restart
      width: 1024       # Hunyuan was exported at a fixed 1024x1024
      height: 1024
      steps: 20
      guidance: 6.0
      style: 电影感的暗调氛围，烛光，写实，精致细节，无文字
