# =============================================================
# Shifting Truth — agent & game configuration
#
# Every LLM agent picks its own brain. provider options:
#   anthropic : public API   (needs ANTHROPIC_API_KEY env var)
#   onnx      : local model  (needs onnxruntime-genai + onnx_dir)
#   mock      : canned replies, no network (plumbing tests)
#
# You can mix freely: e.g. cheap API model for NPCs, strong API
# model for the judge — or NPCs on a local ONNX model and the
# judge on the API.
# =============================================================
agents:
  npc:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    # provider: onnx
    # onnx_dir: ./models/phi-3.5-mini-instruct-onnx
  judge:
    provider: anthropic
    model: claude-sonnet-4-6
    # The judge writes deeds/gossip and grades the final answer.
    # Give it the strongest model you can afford.

game:
  # Language: en | zh. Override with --lang; if left null the game asks
  # at startup. English stays the default; each language has its own case.
  lang: null
  cases:
    en: case.yaml
    zh: case_zh.yaml
  case: case.yaml     # fallback if no per-language case is set
  seed: null          # seeds method/clue rolls; the culprit is the
                      # judge LLM's choice, so see the developer log to
                      # reproduce a specific game's hidden truth
  # Launch mode (override with --mode):
  #   production : logs the full conversation only.
  #   developer  : also logs the judge's culprit/motive choice, the
  #                resolved ground truth, and every NPC's memory at each
  #                stage. Logs are written to disk, never shown in-game.
  mode: production
  log_dir: logs       # logs go to <log_dir>/<session-timestamp>/

# Time costs (in minutes of the in-fiction clock)
costs:
  search: 2           # searching one spot
  question: 1         # one question to a suspect
  show: 1             # showing a piece of evidence

# Generated art for the Phaser web UI (web.py). Optional: if the model or a GPU
# is unavailable, generation is skipped and the UI falls back to plain backdrops
# — exactly like the mock-LLM fallback. Manifest first, paint second: the room
# backdrops are painted from the per-run room manifest, the chips come from the
# manifest, never from the picture.
images:
  enabled: true
  idmc_path: /workspace                           # holds inference_driven_model_compiler (edit model import)
  provider: CUDAExecutionProvider                 # falls back to no-art if it can't load
  cache_dir: webui/assets/cache                   # served at /assets/cache/<name>
  negative: "people, person, hands, text, watermark, signature, frame, border, blurry, lowres, deformed"
  # Scene art: a plot-related background painted by SDXL txt2img, then each clue/decoy
  # item is edited ONTO it by our exported InstructPix2Pix ONNX model
  # (OnTheFlyORTImageEditPipeline) — an imperative "add ..." edit, no mask. If the edit
  # model can't load, imagegen falls back to the masked-inpaint path automatically.
  edit_backend: instructpix2pix_onnx
  edit_model: Jinyan0924/instruct-pix2pix-onnx    # private; needs HF_TOKEN in the env
  edit_provider: CUDAExecutionProvider
  edit_size: 512                                  # the model is exported at 512x512
  edit_steps: 12
  # image_guidance keeps the edit faithful to the painted background. Low values
  # (1.5) let InstructPix2Pix over-edit the whole scene (and hallucinate hands);
  # ~2.2 preserves the backdrop and embeds the item subtly.
  edit_image_guidance: 2.2
  edit_guidance: 7.5
  # Scenes are now built by an INPAINTING model (export_inpaint.py): a base backdrop
  # (full-mask txt2img) with clue items + decoy props inpainted into it. One English
  # model serves BOTH languages, because rooms.py builds every image prompt in English
  # internally — so a Chinese game paints from the same model. Loaded lazily on first use.
  # Runs SDXL natively via diffusers on the GPU (torch, fp16) — NOT ONNX (onnxruntime-gpu
  # mis-shapes the inpaint UNet, CPU ONNX is too slow). ONE model: txt2img paints the base
  # scene reliably, and an inpaint pipeline built from the same weights (from_pipe, no extra
  # VRAM) embeds the clue/decoy objects into it.
  by_lang:
    en: &inpaint_en
      model_dir: /dev/shm/sdxl-base   # ephemeral (RAM-backed): re-fetch on restart
      width: 1024       # SDXL is native 1024
      height: 1024
      steps: 26
      guidance: 7.0
      dtype: float16
      variant: fp16
      device: cuda
      style: >-
        moody noir painted illustration, dramatic candlelight, deep shadows,
        point-and-click adventure game background art, cinematic, atmospheric, no people, no text
    zh: *inpaint_en     # same inpaint model + English prompts (built internally)

# Optional voice (text-to-speech) for conversation lines. A thin, lazy, cached layer over
# chatterbox. English uses the fast chatterbox-turbo ONNX pipeline (sibling
# inference_driven_model_compiler); 中文 uses the full chatterbox MULTILINGUAL model
# (language_id: zh). Both clone the same public-domain reference clips. Fail-soft: if a
# model can't load, that language just has no audio.
audio:
  enabled: true
  idmc_path: /workspace                  # holds inference_driven_model_compiler
  provider: CUDAExecutionProvider        # falls back to no-voice if it can't load
  device: cuda
  cache_dir: webui/assets/cache/audio    # served at /assets/cache/audio/<name>
  voices_dir: webui/assets/voices        # reference clips (CMU Arctic, public domain)
  player_voice: narrator                 # the player's own questions
  default_voice: female_a                # any suspect not in `assign`
  # suspect display name -> voice id (gender-matched). Both the English and 中文 casts are
  # listed, so a Chinese game gets gender-matched voices too.
  assign:
    Marco Chen: male_a
    James Okafor: male_b
    Elena Voss-Reyes: female_a
    Dr. Priya Sharma: female_b
    Sofia Lindqvist: female_a
    陈马可: male_a
    詹姆斯·奥卡福: male_b
    埃琳娜·沃斯-雷耶斯: female_a
    普丽娅·夏尔马: female_b
    索菲娅·林德奎斯特: female_a
  _voices: &tts_voices                    # voice id -> reference wav (in voices_dir)
    male_a: male_a.wav
    male_b: male_b.wav
    female_a: female_a.wav
    female_b: female_b.wav
    narrator: narrator.wav
  by_lang:
    en:
      backend: turbo_onnx                # fast English ONNX pipeline
      model_dir: /workspace/models/chatterbox-turbo-onnx
      voices: *tts_voices
    zh:
      backend: multilingual              # full chatterbox model, downloads on first use
      language_id: zh
      voices: *tts_voices

# Optional lip-sync talking head (web.py). After the suspect's reply is voiced, Wav2Lip
# animates their photoreal portrait's mouth to the speech -> a talking character, not a
# static card. Same fail-soft rule: if Wav2Lip/checkpoints are missing, the UI just shows
# the static portrait. Language-independent (needs only a face + the reply wav).
video:
  enabled: true
  wav2lip_dir: /workspace/Wav2Lip
  checkpoint: /workspace/Wav2Lip/checkpoints/wav2lip_gan.pth
  device: cuda
  out_height: 512          # downscale the portrait for fast generation (<1s warm)
  preset: veryfast         # x264 speed/quality
  cache_dir: webui/assets/cache/video   # served at /assets/cache/video/<name>
