<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Shifting Truth</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
  :root{ --ink:#e8e2d6; --dim:#9a9082; --panel:#161310ee; --line:#3a342c;
         --accent:#c9a14a; --bad:#b4654a; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#0c0a08; color:var(--ink);
    font-family:"Iowan Old Style",Georgia,"Songti SC",serif; }
  #wrap{ position:relative; width:100vw; height:100vh; margin:0; }
  #game{ width:100vw; height:100vh; }
  /* DOM overlays sit above the Phaser canvas */
  .overlay{ position:absolute; inset:0; display:none; z-index:20;
    background:#0c0a08cc; align-items:center; justify-content:center; }
  .overlay.show{ display:flex; }
  .card{ width:680px; max-width:92%; max-height:88%; overflow:auto;
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:22px 24px; box-shadow:0 20px 60px #000a; }
  .card h2{ margin:0 0 6px; font-weight:600; letter-spacing:.3px; }
  .muted{ color:var(--dim); font-size:14px; line-height:1.5; }
  .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  button.btn{ background:#211c16; color:var(--ink); border:1px solid var(--line);
    border-radius:9px; padding:9px 14px; cursor:pointer; font:inherit; font-size:15px; }
  button.btn:hover{ border-color:var(--accent); color:#fff; }
  button.btn.primary{ background:var(--accent); color:#1a1408; border-color:var(--accent); font-weight:700; }
  button.btn:disabled{ opacity:.45; cursor:default; }
  input,textarea,select{ background:#0e0c0a; color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:9px 11px; font:inherit; font-size:15px; width:100%; }
  textarea{ resize:vertical; min-height:64px; }
  .chatlog{ height:300px; overflow:auto; border:1px solid var(--line); border-radius:10px;
    padding:12px; margin:10px 0; background:#0e0c0a; }
  .bub{ margin:7px 0; padding:8px 11px; border-radius:10px; max-width:82%; white-space:pre-wrap; line-height:1.45; }
  .bub.you{ background:#23303a; margin-left:auto; }
  .bub.npc{ background:#241f18; }
  .who{ font-size:12px; color:var(--dim); margin:2px 2px 0; }
  .bub.typing{ color:var(--dim); }
  .dots i{ font-style:normal; animation:blink 1s infinite; }
  .dots i:nth-child(2){ animation-delay:.2s } .dots i:nth-child(3){ animation-delay:.4s }
  @keyframes blink{ 0%,100%{opacity:.2} 50%{opacity:1} }
  .evchip{ display:inline-block; margin:3px; padding:5px 9px; border:1px solid var(--line);
    border-radius:999px; background:#1a1610; font-size:13px; cursor:pointer; }
  .evchip:hover{ border-color:var(--accent); }
  .stars{ font-size:28px; letter-spacing:6px; cursor:pointer; color:#5a5247; }
  .stars b{ color:var(--accent); }
  #toast{ position:absolute; left:50%; bottom:18px; transform:translateX(-50%);
    background:#000c; border:1px solid var(--line); border-radius:8px; padding:8px 14px;
    font-size:14px; z-index:40; display:none; }
  a.lnk{ color:var(--dim); font-size:12px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="game"></div>

  <!-- chat overlay -->
  <div id="chat" class="overlay"><div class="card">
    <div class="row" style="justify-content:space-between">
      <h2 id="chatName">—</h2>
      <div class="row" style="gap:6px;align-items:center">
        <span id="voiceStatus" class="muted" style="font-size:12px"></span>
        <button id="soundBtn" class="btn" title="Voice" onclick="toggleSound()">🔊</button>
        <button class="btn" onclick="closeOverlay('chat')">✕</button>
      </div>
    </div>
    <div class="muted" id="chatRole"></div>
    <!-- talking head: static photoreal portrait, swapped for a lip-synced video while the
         suspect speaks, then back to the portrait -->
    <div id="chatMedia" style="text-align:center;margin:8px 0">
      <img id="chatFace" alt="" style="height:200px;border-radius:12px;border:1px solid #2a241c;object-fit:cover;display:none"/>
      <video id="chatVideo" playsinline style="height:200px;border-radius:12px;border:1px solid #2a241c;display:none"></video>
    </div>
    <div class="chatlog" id="chatLog"></div>
    <div id="chatEv" class="muted" style="margin-bottom:6px"></div>
    <div class="row">
      <input id="chatInput" placeholder="Ask a question…" style="flex:1"
             onkeydown="if(event.key==='Enter')sendChat()"/>
      <button id="chatAsk" class="btn primary" onclick="sendChat()">Ask</button>
    </div>
  </div></div>

  <!-- accuse overlay -->
  <div id="accuse" class="overlay"><div class="card">
    <h2 id="accTitle">The police are here. Name them.</h2>
    <div class="muted" id="accSub">One accusation: who, why, and how.</div>
    <div style="margin:14px 0 6px" class="muted">WHO</div>
    <select id="accWho"></select>
    <div style="margin:12px 0 6px" class="muted">WHY (their motive)</div>
    <textarea id="accWhy"></textarea>
    <div style="margin:12px 0 6px" class="muted">HOW (the method)</div>
    <textarea id="accHow"></textarea>
    <div class="row" style="margin-top:14px; justify-content:flex-end">
      <button class="btn primary" onclick="submitAccuse()">Accuse</button>
    </div>
  </div></div>

  <!-- shared popup card: reused for between-acts gossip, found/picked items, inspect,
       and the evidence pouch. The subtitle is set per use (only the gossip case fills it). -->
  <div id="gossip" class="overlay"><div class="card">
    <h2 id="gossipTitle">Between the acts…</h2>
    <div class="muted" id="gossipSub" style="display:none"></div>
    <div id="gossipBody" style="margin-top:12px"></div>
    <div class="row" style="margin-top:14px; justify-content:flex-end">
      <button class="btn primary" onclick="closeOverlay('gossip')">Continue ▸</button>
    </div>
  </div></div>

  <!-- verdict overlay -->
  <div id="verdict" class="overlay"><div class="card">
    <h2 id="vTitle">The verdict</h2>
    <div id="vBody" class="muted" style="white-space:pre-wrap; margin:10px 0 16px"></div>
    <div class="muted">Rate tonight's mystery:</div>
    <div class="stars" id="vStars" data-v="0">★★★★★</div>
    <textarea id="vComment" placeholder="Optional: what landed, what didn't…" style="margin-top:10px"></textarea>
    <div class="row" style="margin-top:14px; justify-content:space-between">
      <a class="lnk" href="/">Play again ↻</a>
      <button class="btn primary" onclick="submitRate()">Submit rating</button>
    </div>
  </div></div>

  <div id="toast"></div>
</div>

<script>
// ----------------------------------------------------------------------------
//  Shifting Truth — Phaser front-end.  Manifest first, paint second:
//  the room data (spots, chips, items) comes from the server's manifest; the
//  generated backdrop is atmosphere behind it, and hotspots are CHIPS, never
//  pixels — so nothing breaks if the painting put the desk somewhere else.
// ----------------------------------------------------------------------------
// Dimensions track the browser window (full-page canvas, Phaser RESIZE mode).
let W = window.innerWidth, H = window.innerHeight, TOP_H = Math.max(360, H - 190);
const G = { sid:null, state:null, lang:'en' };

async function api(path, body){
  const r = await fetch('/api'+path, {
    method:'POST',
    headers:{'Content-Type':'application/json', 'X-Session': G.sid||''},
    body: JSON.stringify(Object.assign({sid:G.sid}, body||{}))
  });
  return r.json();
}
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block';
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.style.display='none', 2200);
}

// ---- voice playback ------------------------------------------------------
// Lines are synthesized on the server in the background; the WAV URL is known
// before the file exists. We play through ONE persistent <audio> element that
// is "unlocked" by the first user gesture (browsers block autoplay otherwise),
// probe readiness with HEAD (the WAV may not exist yet), and a sequential queue
// keeps the player's question and the suspect's reply from overlapping.
let _voiceEl=null, _voiceUnlocked=false;
const _SILENT='data:audio/wav;base64,UklGRjQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YRAAAAAAAAAAAAAAAAAAAAAAAAA=';
function _getVoiceEl(){ if(!_voiceEl){ _voiceEl=new Audio(); _voiceEl.preload='auto'; } return _voiceEl; }
function unlockAudio(){
  if(_voiceUnlocked) return;
  const a=_getVoiceEl();
  try{ a.src=_SILENT; const p=a.play(); if(p&&p.then) p.then(()=>{_voiceUnlocked=true;}).catch(()=>{}); else _voiceUnlocked=true; }catch(e){}
}
// keep trying to unlock on every gesture until it sticks
document.addEventListener('pointerdown', unlockAudio);
document.addEventListener('keydown', unlockAudio);
let _soundHinted=false;
function _soundHint(){ if(_soundHinted) return; _soundHinted=true; toast('🔊 Tap the speaker button to enable voice'); }

// Sound on/off toggle (chat panel). Clicking it is a user gesture, so it also
// unlocks audio; turning it back on replays the last reply line.
let _soundOn = (localStorage.getItem('voiceOn') !== '0');
let _lastVoiceUrl = null;
function updateSoundBtn(){
  const b=document.getElementById('soundBtn');
  if(b){ b.textContent=_soundOn?'🔊':'🔇'; b.title=_soundOn?'Voice on — click to mute':'Voice off — click to enable'; }
}
function toggleSound(){
  _soundOn=!_soundOn; try{ localStorage.setItem('voiceOn', _soundOn?'1':'0'); }catch(e){}
  updateSoundBtn();
  if(_soundOn){ unlockAudio(); if(_lastVoiceUrl) playVoice(_lastVoiceUrl); }
  else { _voiceQ.length=0; _voiceBusy=false; try{ _getVoiceEl().pause(); }catch(e){} }
}

function _voiceStatus(t){ const e=document.getElementById('voiceStatus'); if(e) e.textContent=t||''; }
const _voiceQ=[]; let _voiceBusy=false;
function playVoice(url){
  if(!url) return;
  if(!_soundOn){ _voiceStatus('🔇 muted — click 🔊'); return; }
  _voiceQ.push(url); _voiceStatus('⏳ voice…'); _pumpVoice();
}
function _pumpVoice(){
  if(_voiceBusy || !_voiceQ.length) return;
  const url=_voiceQ.shift(); _voiceBusy=true;
  _playWhenReady(url, ()=>{ _voiceBusy=false; if(!_voiceQ.length) _voiceStatus(''); _pumpVoice(); });
}
function _playWhenReady(url, done, tries=0){
  // Wait for the WAV to exist (background synthesis; the first one may wait on a
  // cold model load), THEN play it on the unlocked element. A blocked play is a
  // user-gesture problem, not a not-ready one — prompt instead of looping.
  fetch(url,{method:'HEAD',cache:'no-store'}).then(r=>{
    if(!r.ok){ if(tries<90) setTimeout(()=>_playWhenReady(url,done,tries+1),500); else done(); return; }
    const a=_getVoiceEl(); let fin=false; const end=()=>{ if(!fin){fin=true; done();} };
    a.onended=end; a.onerror=end; a.src=url;
    a.onplaying=()=>_voiceStatus('▶ playing');
    const p=a.play();
    if(p&&p.then) p.then(()=>_voiceStatus('▶ playing')).catch(()=>{ _voiceUnlocked=false; _voiceStatus('⚠ blocked — click 🔊'); _soundHint(); end(); });
  }).catch(()=>{ if(tries<60) setTimeout(()=>_playWhenReady(url,done,tries+1),500); else done(); });
}
let _overlayClosedAt = 0;
function closeOverlay(id){ document.getElementById(id).classList.remove('show'); _overlayClosedAt = performance.now(); }
// Play the suspect's lip-sync talking-head video (its audio IS the reply voice). Polls
// until the MP4 lands (generated in the background), swaps the portrait for the video,
// and falls back to audio-only if the video never arrives or can't autoplay.
function playTalk(videoUrl, audioUrl){
  if(!videoUrl){ if(audioUrl) playVoice(audioUrl); return; }
  const vid=document.getElementById('chatVideo'), face=document.getElementById('chatFace');
  let tries=0; _voiceStatus('⏳ video…');
  const back=()=>{ try{vid.pause();}catch(e){} vid.style.display='none'; if(face.getAttribute('src')) face.style.display=''; };
  const fallback=()=>{ back(); if(audioUrl) playVoice(audioUrl); };
  const tryPlay=()=>{
    fetch(videoUrl,{method:'HEAD',cache:'no-store'}).then(r=>{
      if(!r.ok){ if(tries++<80) setTimeout(tryPlay,500); else fallback(); return; }
      vid.muted=!_soundOn; vid.src=videoUrl;
      vid.oncanplay=()=>{ face.style.display='none'; vid.style.display=''; };
      vid.onended=back; vid.onerror=fallback;
      const p=vid.play();
      if(p&&p.then) p.then(()=>_voiceStatus('▶ playing')).catch(()=>fallback());
    }).catch(()=>{ if(tries++<80) setTimeout(tryPlay,500); else fallback(); });
  };
  tryPlay();
}
function showOverlay(id){ document.getElementById(id).classList.add('show'); }
// True while a popup is open, or for a moment after one closes — used to swallow the
// click that dismissed the popup so it doesn't "fall through" to the Phaser hotspot/button
// underneath the Continue button (which would re-open the card in a loop).
function overlayBusy(){ return !!document.querySelector('.overlay.show')
  || (performance.now() - _overlayClosedAt) < 400; }
// The shared popup's subtitle: only the between-acts gossip sets it; everything else clears
// it (so "Careless questions travel…" doesn't show on every item pickup/inspect).
function setGossipSub(text){ const e=document.getElementById('gossipSub'); if(!e) return;
  e.textContent=text||''; e.style.display=text?'block':'none'; }
const L = () => (G.state && G.state.web) || {};

// ============================ Boot / Start ==================================
class StartScene extends Phaser.Scene {
  constructor(){ super('Start'); }
  create(){
    this.cameras.main.setBackgroundColor('#0c0a08');
    this.add.text(W/2, 150, 'SHIFTING TRUTH', {fontFamily:'Georgia', fontSize:'52px',
      color:'#e8e2d6'}).setOrigin(.5);
    this.add.text(W/2, 210, 'a painted murder, re-rolled every night', {fontSize:'18px',
      color:'#9a9082'}).setOrigin(.5);
    this.mkLangBtn(W/2-110, 330, 'English', 'en');
    this.mkLangBtn(W/2+110, 330, '中文', 'zh');
    this.add.text(W/2, 470, 'Five fixed faces. None of them quite innocent.',
      {fontSize:'15px', color:'#6f675b'}).setOrigin(.5);
    this.status = this.add.text(W/2, 540, '', {fontSize:'16px', color:'#c9a14a'}).setOrigin(.5);
  }
  mkLangBtn(x,y,label,lang){
    const g=this.add.container(x,y);
    const r=this.add.rectangle(0,0,180,56,0x211c16).setStrokeStyle(1,0x3a342c);
    const tx=this.add.text(0,0,label,{fontSize:'22px',color:'#e8e2d6'}).setOrigin(.5);
    g.add([r,tx]); g.setSize(180,56).setInteractive({useHandCursor:true});
    g.on('pointerover',()=>r.setStrokeStyle(2,0xc9a14a));
    g.on('pointerout', ()=>r.setStrokeStyle(1,0x3a342c));
    g.on('pointerdown', async ()=>{
      this.status.setText('Setting the scene…'); G.lang=lang;
      const s = await api('/new', {lang});
      if(s.error){ this.status.setText('Error: '+s.error); return; }
      G.sid = s.sid; G.state = s;
      this.scene.start('Intro');
    });
  }
}

// ============================ Intro (paint behind it) =======================
class IntroScene extends Phaser.Scene {
  constructor(){ super('Intro'); }
  create(){
    this.cameras.main.setBackgroundColor('#0c0a08');
    const sc = G.state.scenario||{};
    this.add.text(W/2, 70, sc.title||'', {fontFamily:'Georgia', fontSize:'40px',
      color:'#e8e2d6', wordWrap:{width:820}, align:'center'}).setOrigin(.5,0);
    this.add.text(W/2, 150, (sc.setting||'').trim(), {fontSize:'17px', color:'#bcb3a3',
      wordWrap:{width:780}, align:'center', lineSpacing:6}).setOrigin(.5,0);
    this.add.text(W/2, 300, (sc.the_accident||'').trim(), {fontSize:'16px', color:'#9a9082',
      wordWrap:{width:780}, align:'center', lineSpacing:6}).setOrigin(.5,0);
    this.note = this.add.text(W/2, 540, 'Painting the estate…', {fontSize:'17px',
      color:'#c9a14a'}).setOrigin(.5);
    this.enterBtn = null;
    this.poll();
    this.timer = this.time.addEvent({delay:1600, loop:true, callback:()=>this.poll()});
  }
  async poll(){
    const s = await api('/state'); if(s && !s.error){ G.state = s; }
    const img = (G.state.images)||{};
    const setup = !!G.state.setup_done;
    this.note.setText(!setup ? 'Setting the scene…'
                      : (img.art_enabled && !img.backdrop) ? 'Painting the estate…'
                      : 'Ready.');
    const ready = setup && (!img.art_enabled || img.backdrop);
    if(ready && !this.enterBtn){
      this.note.setText(img.art_enabled ? 'The estate is painted.' : 'Art disabled — plain backdrops.');
      this.timer.remove();
      this.enterBtn = this.add.text(W/2, 585, '  Enter ▸  ', {fontSize:'22px',
        color:'#1a1408', backgroundColor:'#c9a14a', fontStyle:'bold', padding:{x:14,y:8}})
        .setOrigin(.5).setInteractive({useHandCursor:true})
        .on('pointerdown', ()=> this.scene.start('Play'));
    }
  }
}

// ============================ Play (the world) =============================
// Scene world is a square the camera roams (the painting is square). Big enough
// to pan/zoom into; the painting upscales to fill it.
let SW = Math.round(Math.max(W, H) * 1.6);

class PlayScene extends Phaser.Scene {
  constructor(){ super('Play'); }
  create(){
    this.objs=[]; this.explore=false; this.minZoom=H/SW; this.sceneIdx=0;
    const cam=this.cameras.main;
    cam.setBackgroundColor('#0c0a08');
    // drag-to-pan (only while exploring; ignored over fixed UI clicks)
    this.input.on('pointerdown', p=>{
      this._d={x:p.x,y:p.y,sx:cam.scrollX,sy:cam.scrollY}; this._dragged=false;
      if(this.explore) this.input.setDefaultCursor('grabbing');
    });
    this.input.on('pointermove', p=>{
      if(!this.explore || !p.isDown || !this._d) return;
      const dx=p.x-this._d.x, dy=p.y-this._d.y;
      if(Math.abs(dx)+Math.abs(dy)>6) this._dragged=true;
      cam.scrollX=this._d.sx-dx/cam.zoom; cam.scrollY=this._d.sy-dy/cam.zoom;
    });
    this.input.on('pointerup', ()=>{ this._d=null; if(this.explore) this.input.setDefaultCursor('grab'); });
    this.input.on('wheel', (p,go,dx,dy)=>{ if(this.explore) this.zoomBy(dy>0?0.88:1.14); });
    // Separate UI camera that never pans/zooms, so chrome stays put while the
    // main camera roams the scene.
    this.uiCam = this.cameras.add(0,0,W,H);
    this.worldObjs=[]; this.uiObjs=[];
    this.loadAndBuild();
  }
  zoomBy(f){ const c=this.cameras.main; c.setZoom(Phaser.Math.Clamp(c.zoom*f, this.minZoom||0.5, 3.4)); }
  gotoScene(i){
    const cnt=((G.state.images||{}).scenes||[]).length || 1;
    this.sceneIdx=((i % cnt)+cnt) % cnt;
    this.loadAndBuild();
  }

  texKey(url){ return 'tex_'+url.replace(/\W/g,'_'); }
  needTextures(){
    const img=G.state.images||{}; const need=[];
    if(img.backdrop) need.push(img.backdrop);
    (img.scenes||[]).forEach(s=>{ if(s.backdrop) need.push(s.backdrop); });
    Object.values(img.faces||{}).forEach(u=>{ if(u) need.push(u); });
    return [...new Set(need)].filter(u=>!this.textures.exists(this.texKey(u)));
  }
  loadAndBuild(){
    const need=this.needTextures();
    if(need.length===0){ this.build(); return; }
    need.forEach(u=> this.load.image(this.texKey(u), u));
    this.load.once('complete', ()=>this.build()); this.load.start();
  }
  async refresh(extra){ if(extra) Object.assign(G.state, extra); this.loadAndBuild(); }

  reg(o){ this.objs.push(o); return o; }
  // world() = roams with the main camera; fix() = pinned by the UI camera.
  world(o){ this.worldObjs.push(o); return this.reg(o); }
  clearObjs(){
    (this.objs||[]).forEach(o=>{ try{o.destroy();}catch(e){} });
    this.objs=[]; this.worldObjs=[]; this.uiObjs=[];
  }

  build(){
    this.clearObjs();
    if(this._scenePoll){ try{this._scenePoll.remove();}catch(e){} this._scenePoll=null; }
    const st=G.state, img=st.images||{}, kind=st.phase_kind;
    const cam=this.cameras.main;
    cam.setSize(W,H); this.uiCam.setSize(W,H);   // track full-page canvas
    // Reset the per-phase hint state when the phase changes.
    const phaseKey=`${st.act_num}-${st.phase_index}`;
    const newPhase=(this._phaseKey!==phaseKey);
    if(newPhase){ this._phaseKey=phaseKey; this.hinted=false; this.hintObjs=[]; this.sceneIdx=0; }

    if(kind==='search'){
      // ---- explorable sub-scene: pan + zoom; clue items + decoys are painted INTO
      //      the scene, clicked to pick up / inspect. Hotspots are still chips placed
      //      from the manifest box, so a weak paint never breaks clicking. ----
      this.explore=true;
      cam.setBounds(0,0,SW,SW);
      this.minZoom = Math.max(W,H)/SW;
      cam.setZoom(this.minZoom * 1.4);
      cam.centerOn(SW/2, SW/2);
      this.input.setDefaultCursor('grab');

      const scenes=img.scenes||[];
      const idx=Math.min(this.sceneIdx, Math.max(0,scenes.length-1));
      this.sceneIdx=idx;
      const sc=scenes[idx]||null;
      const bd=sc&&sc.backdrop;
      if(bd && this.textures.exists(this.texKey(bd))){
        this.world(this.add.image(0,0,this.texKey(bd)).setOrigin(0).setDisplaySize(SW,SW));
      } else {
        this.world(this.add.rectangle(0,0,SW,SW,0x171310).setOrigin(0));
      }
      const clamp=v=>Phaser.Math.Clamp(v,0.04,0.96);
      (sc?sc.objects||[]:[]).forEach(o=>{
        const ox=clamp(o.x)*SW, oy=clamp(o.y)*SW;
        const ow=Math.max(96,(o.w||0.2)*SW), oh=Math.max(96,(o.h||0.2)*SW);
        // No boxes. A soft warm glow (additive, so it reads as light not a shape) fades in
        // only while hovered, lighting up the prop under the cursor.
        const glow=this.world(this.add.ellipse(ox,oy,ow*1.3,oh*1.3,0xffd98a,0));
        glow.setBlendMode(Phaser.BlendModes.ADD);
        if(o.collected){
          this.world(this.add.text(ox,oy,'✓',{fontSize:'30px',color:'#9fe0a0'})
            .setOrigin(.5)).setAlpha(0.8);   // quiet "collected" tick
        }
        // invisible click target over the prop; cursor turns to a hand on hover
        const zone=this.world(this.add.zone(ox,oy,ow,oh).setInteractive({useHandCursor:true}));
        zone.on('pointerover',()=>{ if(!o.collected){ this.tweens.add({targets:glow,alpha:0.5,duration:150}); } });
        zone.on('pointerout', ()=>{ this.tweens.add({targets:glow,alpha:0,duration:220}); });
        zone.on('pointerup',()=>{
          if(this._dragged || overlayBusy()) return;   // ignore the click that closed a popup
          if(o.kind==='collectible'){ o.collected ? doInspect(o.id) : doPickup(o.id); }
          else doInspect(o.id);
        });
      });
      // Last-resort hint: gentle glow on uncollected clue objects /api/hint returned.
      const byId={}; (sc?sc.objects||[]:[]).forEach(o=>byId[o.id]=o);
      (this.hintObjs||[]).forEach(id=>{
        const o=byId[id]; if(!o || o.collected) return;
        const gx=clamp(o.x)*SW, gy=clamp(o.y)*SW;
        const glow=this.world(this.add.circle(gx,gy,60,0xc9a14a,0.16).setStrokeStyle(3,0xc9a14a,0.6));
        this.tweens.add({targets:glow, scale:1.6, alpha:0.05, duration:1100,
          yoyo:true, repeat:-1, ease:'Sine.inOut'});
      });
      // Later acts paint in the background — poll until this scene's backdrop lands.
      if(img.art_enabled && sc && !sc.backdrop){
        this._scenePoll=this.time.delayedCall(2500, async()=>{
          const s=await api('/state'); if(s && !s.error){ G.state=s; }
          if(this.scene.isActive()) this.loadAndBuild();
        });
      }
    } else {
      // ---- talk / accuse / over: fixed framing ----
      this.explore=false;
      this.input.setDefaultCursor('default');
      cam.setBounds(0,0,W,H); cam.setZoom(1); cam.centerOn(W/2,H/2);
      if(img.backdrop && this.textures.exists(this.texKey(img.backdrop))){
        const bd=this.world(this.add.image(W/2, TOP_H/2, this.texKey(img.backdrop)));
        bd.setScale(Math.max(W/bd.width, TOP_H/bd.height));
        const mask=this.make.graphics().fillRect(0,0,W,TOP_H);
        bd.setMask(mask.createGeometryMask());
      } else {
        this.world(this.add.rectangle(W/2,TOP_H/2,W,TOP_H,0x171310));
      }
      this.world(this.add.rectangle(0,TOP_H,W,H-TOP_H,0x0e0c0a).setOrigin(0));
      this.world(this.add.line(0,TOP_H,0,0,W,0,0x3a342c).setOrigin(0));
      if(kind==='talk'){ (st.cast||[]).forEach((c,i)=> this.world(this.makeFace(c,i,kind))); }
    }

    // ---- fixed UI chrome (rendered by the UI camera, never pans/zooms) ----
    const fix=o=>{ this.uiObjs.push(o); return this.reg(o); };
    fix(this.add.rectangle(0,0,W,40,0x000000,0.55).setOrigin(0));
    fix(this.add.text(12,10, `Act ${st.act_num||'-'} · ${st.act_title||''}`, {fontSize:'15px',color:'#e8e2d6'}));
    const kindLabel = kind==='search'?'SEARCH':kind==='talk'?'INTERROGATE':kind==='accuse'?'ACCUSE':'—';
    fix(this.add.text(W-12,10, `${kindLabel}  ·  phase ${st.phase_index}/${st.phase_total}`,
      {fontSize:'14px',color:'#c9a14a'}).setOrigin(1,0));
    this.timerText=fix(this.add.text(W/2,10,'',{fontSize:'14px',color:'#bcb3a3'}).setOrigin(.5,0));
    // Only (re)start the countdown on a real phase change — a rebuild (search,
    // hint glow, resize) must NOT reset the clock; just repaint the current value.
    if(newPhase) this.startTimer(st.phase_seconds||0); else this.renderTimer();

    // evidence + next (fixed)
    fix(this.add.text(20,H-34, `🗂 ${(st.evidence||[]).length}`, {fontSize:'16px',color:'#bcb3a3'})
      .setInteractive({useHandCursor:true}).on('pointerup',()=>{ if(!this._dragged && !overlayBusy()) openEvidence(); }));
    if(kind!=='accuse' && kind!=='over'){
      const nextLabel = (st.phase_index>=st.phase_total) ? 'The police arrive ▸' : 'End phase ▸';
      fix(this.add.text(W-20,H-34, nextLabel, {fontSize:'15px',color:'#1a1408',
        backgroundColor:'#c9a14a', padding:{x:10,y:6}, fontStyle:'bold'}).setOrigin(1,0)
        .setInteractive({useHandCursor:true}).on('pointerup',()=>{ if(!this._dragged && !overlayBusy()) doNext(); }));
    }
    // zoom controls (search only) — symbols, no words
    if(kind==='search'){
      const mkZoom=(label,dx,f)=> fix(this.add.text(W-20-dx, H-78, label, {fontSize:'22px',color:'#e8e2d6',
        backgroundColor:'#211c16', padding:{x:12,y:4}}).setOrigin(1,0)
        .setInteractive({useHandCursor:true}).on('pointerup',()=>{ if(!this._dragged && !overlayBusy()) this.zoomBy(f); }));
      mkZoom('+',0,1.25); mkZoom('−',52,0.8);
    }
    // scene navigation (search only, when the act has more than one sub-scene)
    if(kind==='search' && (img.scenes||[]).length>1){
      const cnt=img.scenes.length, idx=Math.min(this.sceneIdx,cnt-1), navY=H-78;
      const arrow=(label,x,onClick)=> fix(this.add.text(x, navY, label, {fontSize:'22px',
        color:'#e8e2d6', backgroundColor:'#211c16', padding:{x:12,y:4}}).setOrigin(0,0)
        .setInteractive({useHandCursor:true}).on('pointerup',()=>{ if(!this._dragged && !overlayBusy()) onClick(); }));
      arrow('◂',20,()=>this.gotoScene(idx-1));
      fix(this.add.text(72, navY+5, `Scene ${idx+1}/${cnt}`, {fontSize:'14px',color:'#bcb3a3'}).setOrigin(0,0));
      arrow('▸',182,()=>this.gotoScene(idx+1));
    }

    if(kind==='accuse'){ openAccuse(); }
    if(kind==='over' && st.verdict){ openVerdict(); }

    // Each camera renders only its own layer.
    this.cameras.main.ignore(this.uiObjs);
    this.uiCam.ignore(this.worldObjs);
  }

  makeFace(c,i,kind){
    const n=(G.state.cast||[]).length, gap=W/(n+1), x=gap*(i+1), y=TOP_H+70;
    const enabled=(kind==='talk');
    const img=G.state.images||{}, url=(img.faces||{})[c.name];
    // Size each face to the available spacing so click areas NEVER overlap — otherwise on
    // a narrow window clicking one suspect lands on the adjacent (next) one.
    const cw=Math.max(56, Math.min(110, Math.round(gap-18)));   // hit-box width < gap
    const fs=Math.min(84, cw-8);                                 // face image size
    const items=[];
    if(url && this.textures.exists(this.texKey(url))){
      const f=this.add.image(0,0,this.texKey(url)); f.setScale(fs/Math.max(f.width,f.height));
      items.push(f);
    } else {
      items.push(this.add.rectangle(0,0,fs,fs, Phaser.Display.Color.HexStringToColor(c.avatar.color).color));
      items.push(this.add.text(0,0,c.avatar.initial,{fontSize:Math.round(fs*0.36)+'px',color:'#fff'}).setOrigin(.5));
    }
    const nm=this.add.text(0,fs/2+6,c.name,{fontSize:'12px',color: enabled?'#e8e2d6':'#8a8174',
      wordWrap:{width:cw+28}, align:'center'}).setOrigin(.5,0);
    const role=this.add.text(0,fs/2+22,c.role,{fontSize:'10px',color:'#6f675b',
      wordWrap:{width:cw+28}, align:'center'}).setOrigin(.5,0);
    items.push(nm,role);
    const g=this.add.container(x,y,items); g.setSize(cw,120);
    g.setAlpha(enabled?1:0.55);
    if(enabled){
      g.setInteractive({useHandCursor:true})
       .on('pointerover',()=>g.setScale(1.05))
       .on('pointerout', ()=>g.setScale(1))
       .on('pointerup',()=>{ if(!this._dragged && !overlayBusy()) openChat(c.name); });
    }
    return g;
  }

  renderTimer(){
    if(!this.timerText) return;
    const r=Math.max(0, this.remaining||0), m=Math.floor(r/60), s=r%60;
    this.timerText.setText(r>0 ? `⏳ ${m}:${String(s).padStart(2,'0')}` : '');
  }
  startTimer(secs){
    this.remaining=secs;
    this.hintAt=Math.max(60, Math.round(secs*0.25));  // last ~quarter / 60s
    if(this.tick) this.tick.remove();
    this.renderTimer();
    if(secs>0){
      this.tick=this.time.addEvent({delay:1000,loop:true,callback:()=>{
        this.remaining--; this.renderTimer();
        // Running low and still short of two clues? Offer a hint (once).
        if(this.explore && !this.hinted && this.remaining<=this.hintAt && this.foundCount()<2){
          this.hinted=true; this.requestHint();
        }
        if(this.remaining<=0){ this.tick.remove(); doNext(); }
      }});
    }
  }

  foundCount(){
    const img=G.state.images||{}; let n=0;
    (img.scenes||[]).forEach(s=>(s.objects||[]).forEach(o=>{ if(o.kind==='collectible'&&o.collected) n++; }));
    return n;
  }

  async requestHint(){
    const r=await api('/hint',{});
    if(r && Array.isArray(r.objects) && r.objects.length){
      this.hintObjs=r.objects.map(o=>o.obj_id);
      // jump to the scene that holds the first hinted object, so the glow is visible
      const scenes=(G.state.images||{}).scenes||[];
      const si=scenes.findIndex(s=>(s.objects||[]).some(o=>o.id===r.objects[0].obj_id));
      if(si>=0) this.sceneIdx=si;
      this.build();
      toast('Time is short — a couple of things seem worth a closer look.');
    }
  }
}

// ============================ actions ======================================
function playScene(){ return game.scene.getScene('Play'); }

async function doSearch(spotId){
  const r = await api('/search', {spot_id:spotId});
  G.state = r;
  const sp=(r.spots||[]).find(s=>s.id===spotId);
  if(sp && (sp.found||[]).length) showSpotResult(sp);
  else toast((r.web&&r.web.found_nothing)||'Found nothing.');
  playScene().build();
}
function itemCard(it){
  const img = it.image ? `<img src="${it.image}" alt="" style="width:120px;height:120px;object-fit:cover;border-radius:8px;border:1px solid #2a241c;float:left;margin:0 12px 6px 0">` : '';
  return `<div style="overflow:hidden;margin:8px 0">${img}<b style="color:#c9a14a">${it.name}</b><br><span class="muted">${escapeHtml(it.found_text)}</span></div>`;
}
function showSpotResult(sp){
  if(!(sp.found||[]).length){ toast('Nothing here.'); return; }
  setGossipSub('');
  document.getElementById('gossipTitle').textContent='You found something';
  document.getElementById('gossipBody').innerHTML=sp.found.map(itemCard).join('<hr style="border-color:#2a241c">');
  showOverlay('gossip');
}

// Pick up an embedded clue object -> evidence pouch. Decoys/peeks -> inspect only.
async function doPickup(objId){
  const r=await api('/pickup',{obj_id:objId});
  if(r && r.images){ G.state=r; }
  const a=(r&&r.action)||{};
  if(a.error){ toast('Can’t pick that up now.'); }
  else if(a.already){ toast('Already in your pouch.'); }
  else { showPickupResult(a); }
  playScene().build();
}
function showPickupResult(a){
  setGossipSub('');
  document.getElementById('gossipTitle').textContent=(L().picked_up)||'You picked something up';
  document.getElementById('gossipBody').innerHTML=itemCard({name:a.name,found_text:a.found_text,image:a.image});
  showOverlay('gossip');
}
async function doInspect(objId){
  const r=await api('/inspect',{obj_id:objId});
  if(r && r.images){ G.state=r; }
  const a=(r&&r.action)||{};
  if(a.error){ toast('Nothing to see.'); return; }
  setGossipSub('');
  document.getElementById('gossipTitle').textContent=a.name||'A closer look';
  let body='<span class="muted">'+escapeHtml(a.text||'')+'</span>';
  if(a.kind==='collectible' && !a.collected){
    body+='<br><br><span style="color:#c9a14a">There’s something here — you can pick it up.</span>';
  }
  document.getElementById('gossipBody').innerHTML=body;
  showOverlay('gossip');
}

let chatName=null;
function openChat(name){
  chatName=name;
  const c=(G.state.cast||[]).find(x=>x.name===name); if(!c) return;
  updateSoundBtn();
  document.getElementById('chatName').textContent=name;
  document.getElementById('chatRole').textContent=c.role;
  // show the static portrait; the lip-sync video swaps in when they reply
  const url=((G.state.images||{}).faces||{})[name];
  const face=document.getElementById('chatFace'), vid=document.getElementById('chatVideo');
  try{ vid.pause(); }catch(e){} vid.style.display='none';
  if(url){ face.src=url; face.style.display=''; } else { face.removeAttribute('src'); face.style.display='none'; }
  renderChat(c);
  // evidence to present
  const ev=G.state.evidence||[];
  const evDiv=document.getElementById('chatEv');
  evDiv.innerHTML = ev.length ? ('Show evidence: '+ev.map(e=>`<span class="evchip" onclick="showEv('${e.name.replace(/'/g,"\\'")}')">▸ ${e.name}</span>`).join('')) : '';
  showOverlay('chat');
  setTimeout(()=>document.getElementById('chatInput').focus(),50);
}
function bubbleHTML(who,html,cls){
  return `<div class="who" style="${who==='you'?'text-align:right':''}">${who==='you'?'You':chatName}</div>`+
         `<div class="bub ${who==='you'?'you':'npc'}${cls||''}">${html}</div>`;
}
function renderChat(c){
  const log=document.getElementById('chatLog');
  log.innerHTML=(c.chat||[]).map(m=>bubbleHTML(m.who, escapeHtml(m.text))).join('');
  log.scrollTop=log.scrollHeight;
}
function chatBusy(on){
  const inp=document.getElementById('chatInput'); inp.disabled=on;
  const ask=document.getElementById('chatAsk'); if(ask) ask.disabled=on;
  const ev=document.getElementById('chatEv'); if(ev) ev.style.pointerEvents=on?'none':'';
}
// Optimistic feedback: echo the player's line and a typing indicator instantly,
// so the (unavoidable) model round-trip doesn't feel frozen.
function showThinking(youText){
  const log=document.getElementById('chatLog');
  log.insertAdjacentHTML('beforeend', bubbleHTML('you', escapeHtml(youText)));
  log.insertAdjacentHTML('beforeend',
    bubbleHTML('npc', '<span class="dots"><i>.</i><i>.</i><i>.</i></span>', ' typing'));
  log.scrollTop=log.scrollHeight;
}
async function sendChat(){
  const inp=document.getElementById('chatInput'); const text=inp.value.trim(); if(!text) return;
  inp.value=''; showThinking(text); chatBusy(true);
  unlockAudio();
  // Voice the question right away — it plays while the reply is generated.
  api('/say',{text}).then(s=>{ if(s) playVoice(s.audio); }).catch(()=>{});
  let transient=null;
  try{
    const r=await api('/talk',{name:chatName,text});
    if(r && r.cast){ G.state=r; }
    if(r && r.action && r.action.error){ toast('Cannot ask now'); }
    // A reply that came back but was NOT recorded in the chat log (e.g. the suspects
    // are still gathering) — keep it on screen instead of letting renderChat wipe it.
    const c0=(G.state.cast||[]).find(x=>x.name===chatName);
    const logged=(c0&&c0.chat||[]).some(m=>m.who==='npc');
    if(r && r.action && r.action.reply && !logged){ transient=r.action.reply; }
    if(r && r.action){
      _lastVoiceUrl=r.action.reply_audio||null;
      if(r.action.reply_video){ playTalk(r.action.reply_video, r.action.reply_audio); }   // talking head (carries the voice)
      else if(r.action.reply_audio){ playVoice(r.action.reply_audio); }                    // audio-only fallback
    }
  } catch(e){ toast('That didn’t go through — try again.'); }
  finally{
    chatBusy(false);
    const c=(G.state.cast||[]).find(x=>x.name===chatName); renderChat(c);
    if(transient){
      // show the player's line + the transient reply so nothing vanishes
      const log=document.getElementById('chatLog');
      log.insertAdjacentHTML('beforeend', bubbleHTML('you', escapeHtml(text)));
      log.insertAdjacentHTML('beforeend', bubbleHTML('npc', escapeHtml(transient)));
      log.scrollTop=log.scrollHeight;
    }
    document.getElementById('chatInput').focus();
  }
}
async function showEv(item){
  showThinking('▸ '+item); chatBusy(true); unlockAudio();
  try{
    const r=await api('/show',{name:chatName,item});
    if(r && r.cast){ G.state=r; }
    if(r && r.action){
      _lastVoiceUrl=r.action.reply_audio||null;
      if(r.action.reply_video){ playTalk(r.action.reply_video, r.action.reply_audio); }
      else if(r.action.reply_audio){ playVoice(r.action.reply_audio); }
    }
  } catch(e){ toast('That didn’t go through — try again.'); }
  finally{
    chatBusy(false);
    const c=(G.state.cast||[]).find(x=>x.name===chatName); renderChat(c);
  }
}

function openEvidence(){
  const ev=G.state.evidence||[];
  setGossipSub('');
  document.getElementById('gossipTitle').textContent='Evidence pouch';
  document.getElementById('gossipBody').innerHTML = ev.length
    ? ev.map(itemCard).join('<hr style="border-color:#2a241c">')
    : '<span class="muted">Nothing yet. Search the scene.</span>';
  showOverlay('gossip');
}

async function doNext(){
  const r=await api('/next',{}); G.state=r;
  if(r.gossip && r.gossip.length){
    setGossipSub('Careless questions travel. Word reaches the suspects.');
    document.getElementById('gossipTitle').textContent='Between the acts…';
    document.getElementById('gossipBody').innerHTML = r.gossip.map(g=>
      `<div style="margin:8px 0"><b>${g.name}</b><br>`+
      g.lines.map(l=>`<span class="muted">• ${escapeHtml(l)}</span>`).join('<br>')+`</div>`).join('');
    showOverlay('gossip');
  }
  playScene().refresh();
}

function openAccuse(){
  const sel=document.getElementById('accWho');
  sel.innerHTML=(G.state.cast||[]).map(c=>`<option value="${c.name}">${c.name} — ${c.role}</option>`).join('');
  showOverlay('accuse');
}
async function submitAccuse(){
  const who=document.getElementById('accWho').value;
  const why=document.getElementById('accWhy').value.trim();
  const how=document.getElementById('accHow').value.trim();
  if(!why||!how){ toast('Give a why and a how.'); return; }
  const r=await api('/accuse',{who,why,how}); G.state=r;
  if(r.action&&r.action.error){ toast('Not finished yet.'); return; }
  closeOverlay('accuse'); playScene().build();
}

function openVerdict(){
  document.getElementById('vBody').textContent=G.state.verdict||'';
  showOverlay('verdict');
}
let starVal=0;
document.addEventListener('click',e=>{
  if(e.target && e.target.id==='vStars'){
    const rect=e.target.getBoundingClientRect();
    starVal=Math.min(5,Math.max(1,Math.ceil((e.clientX-rect.left)/(rect.width/5))));
    e.target.innerHTML='<b>'+'★'.repeat(starVal)+'</b>'+'★'.repeat(5-starVal);
  }
});
async function submitRate(){
  await api('/rate',{stars:starVal,comment:document.getElementById('vComment').value});
  toast('Thanks — rating saved.'); closeOverlay('verdict');
}

function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ============================ boot =========================================
const game = new Phaser.Game({
  type: Phaser.AUTO, parent:'game', width:W, height:H,
  backgroundColor:'#0c0a08',
  scale:{ mode:Phaser.Scale.RESIZE, parent:'game', width:'100%', height:'100%' },
  scene:[StartScene, IntroScene, PlayScene]
});

window.game = game;   // expose for debugging

// Keep the global dimensions in sync with the canvas and re-lay-out on resize.
function applySize(w,h){
  W=Math.round(w); H=Math.round(h);
  TOP_H=Math.max(360, H-190);
  SW=Math.round(Math.max(W,H)*1.6);
}
game.scale.on('resize', (sz)=>{
  applySize(sz.width, sz.height);
  clearTimeout(window.__rz);
  window.__rz=setTimeout(()=>{
    game.scene.getScenes(true).forEach(s=>{
      if(s.scene.key==='Play' && Array.isArray(s.objs)) s.build();
      else if(s.scene.isActive()) s.scene.restart();
    });
  }, 120);
});
</script>
